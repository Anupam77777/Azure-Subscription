# =============================================================================
# pipelines/azure-pipelines.yml
# Deploys at TENANT scope: creates the subscription then the landing zone.
# =============================================================================

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - '**/*.bicep'
      - '**/*.bicepparam'
      - 'pipelines/*'

parameters:
  - name: environment
    displayName: 'Environment to deploy'
    type: string
    default: 'dev'
    values:
      - dev
      - prod

variables:
  # ARM service connection. Its identity needs:
  #   - Owner/Contributor at the tenant root (or target) management group
  #   - A billing role on the billing scope (to create subscriptions)
  #   - Network Contributor on the hub RG/subscription (for hub->spoke peering)
  azureServiceConnection: 'sc-azure-tenant-deploy'
  # Required metadata location for tenant-scope deployments.
  location: 'eastus'
  templateFile: 'main.bicep'
  paramFile: 'parameters/${{ parameters.environment }}.bicepparam'

stages:
  # ---------------------------------------------------------------------------
  - stage: Validate
    displayName: 'Validate'
    jobs:
      - job: validate
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: 'Bicep build (lint)'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az bicep build --file $(templateFile)

          - task: AzureCLI@2
            displayName: 'What-If (tenant scope)'
            # What-if on a not-yet-created subscription can be noisy; don't block on it.
            continueOnError: true
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az deployment tenant what-if \
                  --location $(location) \
                  --template-file $(templateFile) \
                  --parameters $(paramFile)

  # ---------------------------------------------------------------------------
  - stage: Deploy
    displayName: 'Create Subscription + Landing Zone'
    dependsOn: Validate
    condition: succeeded()
    jobs:
      - deployment: deployTenant
        displayName: 'Deploy ${{ parameters.environment }}'
        environment: ${{ parameters.environment }}   # add approvals here for prod
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: 'az deployment tenant create'
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az deployment tenant create \
                        --name lz-$(Build.BuildId) \
                        --location $(location) \
                        --template-file $(templateFile) \
                        --parameters $(paramFile)
